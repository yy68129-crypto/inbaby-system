<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>INBABY 茵寶貝｜全功能管理系統</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --main-pink: #f9a8c0;
      --dark-pink: #f06292;
      --light-pink: #fce4ec;
      --soft-pink: #fdf0f4;
      --text-dark: #3d2b35;
      --text-gray: #7a6370;
      --border-pink: #f8bbd0;
    }
    * { box-sizing: border-box; }
    body { background: #fff5f8; font-family: "Microsoft JhengHei","PingFang TC",sans-serif; font-size: 14px; color: var(--text-dark); min-height: 100vh; }
    h4, h5 { color: var(--dark-pink); font-weight: 700; }
    #loginCard { background: #fff; border: none; border-radius: 24px; box-shadow: 0 8px 40px rgba(240,98,146,0.12); padding: 2.5rem !important; margin-top: 5vh !important; max-width: 450px; margin-left: auto; margin-right: auto; }
    .container { max-width: 1200px; }
    .nav-tabs { border: none; background: #fff; border-radius: 50px; padding: 4px; display: inline-flex; box-shadow: 0 2px 12px rgba(240,98,146,0.08); margin-bottom: 1.5rem !important; flex-wrap: wrap; }
    .nav-tabs .nav-link { border: none !important; border-radius: 50px !important; padding: 8px 16px; color: var(--text-gray); font-weight: 500; cursor: pointer; transition: all 0.2s; font-size: 13px; }
    .nav-tabs .nav-link.active { background: var(--dark-pink) !important; color: #fff !important; font-weight: 700; }
    .card { border: 1px solid var(--border-pink) !important; border-radius: 18px !important; box-shadow: 0 4px 20px rgba(240,98,146,0.06) !important; background: #fff; margin-bottom: 20px; }
    .btn-pink { background: linear-gradient(135deg, var(--main-pink), var(--dark-pink)); color: #fff !important; border: none; border-radius: 50px; font-weight: 600; padding: 8px 20px; transition: all 0.2s; box-shadow: 0 4px 12px rgba(240,98,146,0.3); }
    .btn-pink:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(240,98,146,0.4); }
    .form-control, .form-select { border: 1.5px solid var(--border-pink) !important; border-radius: 12px !important; padding: 8px 14px !important; }
    table.table thead th { background: linear-gradient(135deg, var(--main-pink), var(--dark-pink)) !important; color: #fff !important; font-weight: 600; padding: 12px 10px !important; font-size: 13px; border: none; }
    table.table tbody td { padding: 10px !important; font-size: 13px; }
    .hide { display: none !important; }
    .status-badge { border-radius: 50px !important; font-size: 11px; padding: 4px 12px !important; font-weight: 600; }
    .admin-tab-link { color: #d4145a !important; font-weight: bold !important; }
    .section-title { border-bottom: 2px solid var(--border-pink); padding-bottom: 10px; margin-bottom: 20px; }
    .modal-content { border-radius: 18px !important; border: 1px solid var(--border-pink) !important; }
    .modal-header { background: linear-gradient(135deg, var(--main-pink), var(--dark-pink)); color: #fff; border-radius: 18px 18px 0 0 !important; }
    .badge-pending { background-color: #ffc107 !important; }
    .badge-confirmed { background-color: #28a745 !important; }
    .badge-shipped { background-color: #17a2b8 !important; }
    .badge-completed { background-color: #6c757d !important; }
  </style>
</head>
<body>
  <div class="container py-4">
    <!-- 登入介面 -->
    <div id="loginCard" class="card">
      <h3 class="text-center mb-4">INBABY 茵寶貝系統登入</h3>
      <div id="loginForm">
        <div class="mb-3">
          <label class="form-label">電子郵件 Email</label>
          <input type="email" id="loginEmail" class="form-control" placeholder="請輸入您的 Email">
        </div>
        <button class="btn btn-pink w-100 py-2" onclick="sendOtp()">取得登入連結</button>
      </div>
    </div>

    <!-- 主應用介面 -->
    <div id="app" class="hide">
      <div class="d-flex justify-content-between align-items-center mb-4 p-3 bg-white rounded-4 shadow-sm">
        <div>
          <h4 class="mb-0">INBABY 茵寶貝童裝社團系統</h4>
          <span id="who" class="text-muted small"></span>
        </div>
        <button class="btn btn-outline-danger btn-sm rounded-pill" onclick="logout()">安全登出</button>
      </div>

      <ul class="nav nav-tabs mb-4">
        <li class="nav-item"><a class="nav-link active" id="tab-orders" onclick="switchTab('orders')">我的訂單</a></li>
        <li class="nav-item"><a class="nav-link" id="tab-profile" onclick="switchTab('profile')">個人帳戶</a></li>
        <li class="nav-item hide" id="adminTab">
          <a class="nav-link admin-tab-link" id="tab-admin" onclick="switchTab('admin')">⭐ 管理後台</a>
        </li>
      </ul>

      <div id="tabContent">
        <!-- 會員：我的訂單 -->
        <div id="section-orders">
          <div class="d-flex align-items-center gap-2 mb-3">
            <span class="text-muted">選擇期別：</span>
            <select id="roundSelector" class="form-select" style="width:160px;" onchange="loadMyOrders()"></select>
            <button class="btn btn-pink btn-sm" onclick="loadMyOrders()">🔄 重新整理</button>
          </div>
          <div class="card p-3">
            <div class="table-responsive">
              <table class="table align-middle">
                <thead>
                  <tr><th>單號</th><th>狀態</th><th>金額</th><th>物流</th><th>出貨日期</th><th>物流單號</th></tr>
                </thead>
                <tbody id="ordersBody"></tbody>
              </table>
            </div>
            <small class="text-muted mt-2">* 點擊訂單列可查看商品明細</small>
          </div>
        </div>

        <!-- 管理員：管理後台 -->
        <div id="section-admin" class="hide">
          <!-- 管理後台子選單 -->
          <ul class="nav nav-tabs mb-3">
            <li class="nav-item"><a class="nav-link active" onclick="switchAdminTab('comments')">社團訂單審核</a></li>
            <li class="nav-item"><a class="nav-link" onclick="switchAdminTab('orders')">訂單管理</a></li>
            <li class="nav-item"><a class="nav-link" onclick="switchAdminTab('members')">會員管理</a></li>
            <li class="nav-item"><a class="nav-link" onclick="switchAdminTab('balance')">帳戶金管理</a></li>
            <li class="nav-item"><a class="nav-link" onclick="switchAdminTab('stock')">配貨管理</a></li>
          </ul>

          <!-- 社團訂單審核區 -->
          <div id="admin-comments" class="card p-3">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <h5>⭐ 社團訂單審核 (FB 匯入區)</h5>
              <button class="btn btn-sm btn-pink" onclick="loadAdminComments()">重新整理留言</button>
            </div>
            <div class="table-responsive">
              <table class="table align-middle">
                <thead>
                  <tr><th>時間</th><th>FB 名稱</th><th>留言內容</th><th>操作</th></tr>
                </thead>
                <tbody id="adminCommentsBody"></tbody>
              </table>
            </div>
          </div>

          <!-- 訂單管理 -->
          <div id="admin-orders" class="hide card p-3">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <h5>訂單管理</h5>
              <button class="btn btn-sm btn-pink" onclick="loadAdminOrders()">重新整理</button>
            </div>
            <div class="table-responsive">
              <table class="table align-middle">
                <thead>
                  <tr><th>單號</th><th>會員</th><th>狀態</th><th>金額</th><th>付款</th><th>操作</th></tr>
                </thead>
                <tbody id="adminOrdersBody"></tbody>
              </table>
            </div>
          </div>

          <!-- 會員管理 -->
          <div id="admin-members" class="hide card p-3">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <h5>會員管理</h5>
              <button class="btn btn-sm btn-pink" onclick="loadAdminMembers()">重新整理</button>
            </div>
            <div class="table-responsive">
              <table class="table align-middle">
                <thead>
                  <tr><th>FB名稱</th><th>Email</th><th>VIP等級</th><th>帳戶金</th><th>總消費</th><th>操作</th></tr>
                </thead>
                <tbody id="adminMembersBody"></tbody>
              </table>
            </div>
          </div>

          <!-- 帳戶金管理 -->
          <div id="admin-balance" class="hide card p-3">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <h5>帳戶金管理</h5>
              <button class="btn btn-sm btn-pink" onclick="loadAdminBalance()">重新整理</button>
            </div>
            <div class="table-responsive">
              <table class="table align-middle">
                <thead>
                  <tr><th>日期</th><th>會員</th><th>金額</th><th>原因</th><th>訂單</th></tr>
                </thead>
                <tbody id="adminBalanceBody"></tbody>
              </table>
            </div>
          </div>

          <!-- 配貨管理 -->
          <div id="admin-stock" class="hide card p-3">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <h5>配貨管理</h5>
              <button class="btn btn-sm btn-pink" onclick="loadAdminStock()">重新整理</button>
            </div>
            <div class="table-responsive">
              <table class="table align-middle">
                <thead>
                  <tr><th>訂單</th><th>產品</th><th>數量</th><th>已配</th><th>斷貨</th><th>狀態</th><th>操作</th></tr>
                </thead>
                <tbody id="adminStockBody"></tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- 個人帳戶 -->
        <div id="section-profile" class="hide">
          <div class="card p-4">
            <h5>帳戶資訊</h5>
            <div class="row g-4">
              <div class="col-md-6">
                <label class="form-label text-muted small">綁定的 FB 名稱</label>
                <input type="text" id="fbNameInput" class="form-control mb-2">
                <button class="btn btn-pink btn-sm" onclick="updateProfile()">儲存修改</button>
              </div>
              <div class="col-md-6">
                <label class="text-muted small d-block">帳戶餘額 (購物金)</label>
                <h4 id="profileBalance" class="text-success fw-bold">$0</h4>
              </div>
            </div>
            <hr>
            <h5>發票資訊</h5>
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">發票類型</label>
                <select id="invoiceType" class="form-select">
                  <option value="個人">個人</option>
                  <option value="公司">公司</option>
                  <option value="載具">載具</option>
                  <option value="捐贈">捐贈</option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label">統一編號</label>
                <input type="text" id="taxIdInput" class="form-control">
              </div>
              <div class="col-md-6">
                <label class="form-label">公司名稱</label>
                <input type="text" id="companyNameInput" class="form-control">
              </div>
              <div class="col-md-6">
                <label class="form-label">載具號碼</label>
                <input type="text" id="carrierNumInput" class="form-control">
              </div>
              <div class="col-md-6">
                <label class="form-label">捐贈碼</label>
                <input type="text" id="donateCodeInput" class="form-control">
              </div>
              <div class="col-12">
                <button class="btn btn-pink btn-sm" onclick="updateInvoiceInfo()">儲存發票資訊</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 轉單 Modal -->
  <div class="modal fade" id="convertModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content p-3">
        <div class="modal-header"><h5>將留言轉為正式訂單</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
          <input type="hidden" id="modalId">
          <div class="mb-2"><label class="small">FB 名稱</label><input type="text" id="modalName" class="form-control" readonly></div>
          <div class="mb-3"><label class="small">留言內容</label><textarea id="modalText" class="form-control" readonly rows="3"></textarea></div>
          <div class="mb-2"><label class="small">產品名稱</label><input type="text" id="modalProd" class="form-control"></div>
          <div class="row">
            <div class="col-6"><label class="small">單價</label><input type="number" id="modalPrice" class="form-control"></div>
            <div class="col-6"><label class="small">數量</label><input type="number" id="modalQty" class="form-control" value="1"></div>
          </div>
          <div class="mb-2 mt-3"><label class="small">顏色/規格</label><input type="text" id="modalSpec" class="form-control"></div>
        </div>
        <div class="modal-footer"><button class="btn btn-pink w-100" onclick="confirmConvert()">確認轉單</button></div>
      </div>
    </div>
  </div>

  <!-- 編輯訂單 Modal -->
  <div class="modal fade" id="editOrderModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content p-3">
        <div class="modal-header"><h5>編輯訂單</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
          <input type="hidden" id="editOrderId">
          <div class="row">
            <div class="col-md-6 mb-2"><label class="small">訂單狀態</label><select id="editOrderStatus" class="form-select"><option value="待審核">待審核</option><option value="已確認">已確認</option><option value="已出貨">已出貨</option><option value="已完成">已完成</option></select></div>
            <div class="col-md-6 mb-2"><label class="small">付款狀態</label><select id="editPayStatus" class="form-select"><option value="未付款">未付款</option><option value="已付款">已付款</option></select></div>
            <div class="col-md-6 mb-2"><label class="small">物流方式</label><input type="text" id="editShippingMethod" class="form-control"></div>
            <div class="col-md-6 mb-2"><label class="small">物流單號</label><input type="text" id="editTrackingNo" class="form-control"></div>
            <div class="col-12 mb-2"><label class="small">總金額</label><input type="number" id="editTotalAmount" class="form-control"></div>
          </div>
        </div>
        <div class="modal-footer"><button class="btn btn-pink w-100" onclick="confirmEditOrder()">儲存修改</button></div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
  <script>
    const SUPABASE_URL = 'https://dcbpjxjdwdyftpiighyw.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_DbPSGp8fOxtt30VDFXtlvw_LzexqDTa';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const ADMIN_EMAIL = 'yy68129@gmail.com';
    let convertModal, editOrderModal;

    document.addEventListener('DOMContentLoaded', () => {
      convertModal = new bootstrap.Modal(document.getElementById('convertModal'));
      editOrderModal = new bootstrap.Modal(document.getElementById('editOrderModal'));
    });

    async function sendOtp() {
      const email = document.getElementById('loginEmail').value;
      if (!email) return alert('請輸入 Email');
      const { error } = await supabaseClient.auth.signInWithOtp({ email, options: { emailRedirectTo: window.location.href } });
      if (error) alert(error.message);
      else alert('連結已發送到您的信箱！');
    }

    async function logout() {
      await supabaseClient.auth.signOut();
      window.location.reload();
    }

    function switchTab(tab) {
      ['orders', 'admin', 'profile'].forEach(s => document.getElementById('section-' + s).classList.toggle('hide', s !== tab));
      document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      if (tab === 'admin') { switchAdminTab('comments'); loadAdminComments(); }
      if (tab === 'orders') loadMyOrders();
    }

    function switchAdminTab(tab) {
      ['comments', 'orders', 'members', 'balance', 'stock'].forEach(s => document.getElementById('admin-' + s).classList.toggle('hide', s !== tab));
      document.querySelectorAll('#section-admin .nav-link').forEach(l => l.classList.remove('active'));
      event.target.classList.add('active');
      if (tab === 'comments') loadAdminComments();
      if (tab === 'orders') loadAdminOrders();
      if (tab === 'members') loadAdminMembers();
      if (tab === 'balance') loadAdminBalance();
      if (tab === 'stock') loadAdminStock();
    }

    async function loadData(user) {
      document.getElementById('who').innerText = user.email;
      if (user.email === ADMIN_EMAIL) document.getElementById('adminTab').classList.remove('hide');
      
      const { data: orders } = await supabaseClient.from('orders').select('round_id').order('created_at', { ascending: false });
      const rounds = [...new Set(orders?.map(o => o.round_id || '預設期別').filter(r => r))];
      const sel = document.getElementById('roundSelector');
      sel.innerHTML = rounds.map(r => `<option value="${r}">${r}</option>`).join('');
      
      loadMyOrders();
    }

    async function loadMyOrders() {
      const { data: { user } } = await supabaseClient.auth.getUser();
      const { data: profile } = await supabaseClient.from('members').select('*').eq('email', user.email).maybeSingle();
      if (profile) {
        document.getElementById('fbNameInput').value = profile.fb_name || '';
        document.getElementById('profileBalance').innerText = '$' + (profile.account_balance || 0);
        document.getElementById('invoiceType').value = profile.invoice_type || '個人';
        document.getElementById('taxIdInput').value = profile.company_tax_id || '';
        document.getElementById('companyNameInput').value = profile.company_name || '';
        document.getElementById('carrierNumInput').value = profile.carrier_num || '';
        document.getElementById('donateCodeInput').value = profile.donate_code || '';
        
        const { data: orders } = await supabaseClient.from('orders').select('*').eq('email', user.email).order('created_at', { ascending: false });
        document.getElementById('ordersBody').innerHTML = orders?.map(o => `
          <tr><td>${o.order_id}</td><td><span class="badge status-badge badge-${o.order_status === '待審核' ? 'pending' : o.order_status === '已確認' ? 'confirmed' : o.order_status === '已出貨' ? 'shipped' : 'completed'}">${o.order_status}</span></td><td>$${o.total_amount}</td><td>${o.shipping_method || '-'}</td><td>${o.shipping_date || '-'}</td><td>${o.tracking_number || '-'}</td></tr>
        `).join('') || '<tr><td colspan="6" class="text-center">暫無訂單</td></tr>';
      }
    }

    async function loadAdminComments() {
      const { data } = await supabaseClient.from('raw_comments').select('*').eq('is_processed', false).order('created_at', { ascending: false });
      document.getElementById('adminCommentsBody').innerHTML = data?.map(c => `
        <tr><td>${new Date(c.created_at).toLocaleString('zh-TW')}</td><td>${c.fb_name}</td><td>${c.comment_text}</td><td><button class="btn btn-sm btn-pink" onclick="openConvert('${c.comment_id}','${c.fb_name}','${c.comment_text.replace(/'/g, "\\'")}')">轉單</button></td></tr>
      `).join('') || '<tr><td colspan="4" class="text-center">目前無待審核留言</td></tr>';
    }

    async function loadAdminOrders() {
      const { data } = await supabaseClient.from('orders').select('*, members(fb_name)').order('created_at', { ascending: false });
      document.getElementById('adminOrdersBody').innerHTML = data?.map(o => `
        <tr><td>${o.order_id}</td><td>${o.members?.fb_name || o.fb_name}</td><td><span class="badge status-badge badge-${o.order_status === '待審核' ? 'pending' : o.order_status === '已確認' ? 'confirmed' : o.order_status === '已出貨' ? 'shipped' : 'completed'}">${o.order_status}</span></td><td>$${o.total_amount}</td><td>${o.pay_status}</td><td><button class="btn btn-sm btn-pink" onclick="openEditOrder('${o.order_id}')">編輯</button></td></tr>
      `).join('') || '<tr><td colspan="6" class="text-center">暫無訂單</td></tr>';
    }

    async function loadAdminMembers() {
      const { data } = await supabaseClient.from('members').select('*').order('created_at', { ascending: false });
      document.getElementById('adminMembersBody').innerHTML = data?.map(m => `
        <tr><td>${m.fb_name}</td><td>${m.email}</td><td>${m.vip_level}</td><td>$${m.account_balance}</td><td>$${m.total_spent}</td><td><button class="btn btn-sm btn-pink" onclick="alert('編輯會員功能開發中')">編輯</button></td></tr>
      `).join('') || '<tr><td colspan="6" class="text-center">暫無會員</td></tr>';
    }

    async function loadAdminBalance() {
      const { data } = await supabaseClient.from('account_log').select('*').order('created_at', { ascending: false }).limit(50);
      document.getElementById('adminBalanceBody').innerHTML = data?.map(l => `
        <tr><td>${new Date(l.created_at).toLocaleString('zh-TW')}</td><td>${l.fb_name}</td><td>${l.amount >= 0 ? '+' : ''}$${l.amount}</td><td>${l.reason}</td><td>${l.order_id || '-'}</td></tr>
      `).join('') || '<tr><td colspan="5" class="text-center">暫無帳戶金紀錄</td></tr>';
    }

    async function loadAdminStock() {
      const { data } = await supabaseClient.from('order_items').select('*, orders(order_id)').order('created_at', { ascending: false });
      document.getElementById('adminStockBody').innerHTML = data?.map(i => `
        <tr><td>${i.orders?.order_id}</td><td>${i.product_name}</td><td>${i.quantity}</td><td>${i.picked}</td><td>${i.out_stock}</td><td><span class="badge status-badge">${i.item_status}</span></td><td><button class="btn btn-sm btn-pink" onclick="alert('配貨編輯功能開發中')">編輯</button></td></tr>
      `).join('') || '<tr><td colspan="7" class="text-center">暫無配貨紀錄</td></tr>';
    }

    function openConvert(id, name, text) {
      document.getElementById('modalId').value = id;
      document.getElementById('modalName').value = name;
      document.getElementById('modalText').value = text;
      document.getElementById('modalProd').value = '';
      document.getElementById('modalPrice').value = 0;
      document.getElementById('modalQty').value = 1;
      document.getElementById('modalSpec').value = '';
      convertModal.show();
    }

    async function confirmConvert() {
      const id = document.getElementById('modalId').value;
      const prod = document.getElementById('modalProd').value;
      const price = parseInt(document.getElementById('modalPrice').value) || 0;
      const qty = parseInt(document.getElementById('modalQty').value) || 1;
      const spec = document.getElementById('modalSpec').value;
      
      if (!prod) return alert('請輸入產品名稱');
      
      // 取得留言資訊
      const { data: comment } = await supabaseClient.from('raw_comments').select('*').eq('comment_id', id).single();
      if (!comment) return alert('留言不存在');
      
      // 建立新訂單
      const { data: newOrder, error: orderError } = await supabaseClient.from('orders').insert({
        fb_name: comment.fb_name,
        email: comment.fb_user_id,
        order_status: '待審核',
        total_amount: price * qty,
        round_id: new Date().toISOString().split('T')[0]
      }).select().single();
      
      if (orderError) return alert('建立訂單失敗：' + orderError.message);
      
      // 建立訂單項目
      await supabaseClient.from('order_items').insert({
        order_id: newOrder.order_id,
        product_name: prod,
        color: spec,
        price: price,
        quantity: qty,
        item_status: '未配貨'
      });
      
      // 標記留言已處理
      await supabaseClient.from('raw_comments').update({ is_processed: true }).eq('comment_id', id);
      
      convertModal.hide();
      loadAdminComments();
      alert('訂單已建立！');
    }

    function openEditOrder(orderId) {
      document.getElementById('editOrderId').value = orderId;
      supabaseClient.from('orders').select('*').eq('order_id', orderId).single().then(({ data: order }) => {
        if (order) {
          document.getElementById('editOrderStatus').value = order.order_status;
          document.getElementById('editPayStatus').value = order.pay_status;
          document.getElementById('editShippingMethod').value = order.shipping_method || '';
          document.getElementById('editTrackingNo').value = order.tracking_number || '';
          document.getElementById('editTotalAmount').value = order.total_amount;
          editOrderModal.show();
        }
      });
    }

    async function confirmEditOrder() {
      const orderId = document.getElementById('editOrderId').value;
      const updates = {
        order_status: document.getElementById('editOrderStatus').value,
        pay_status: document.getElementById('editPayStatus').value,
        shipping_method: document.getElementById('editShippingMethod').value,
        tracking_number: document.getElementById('editTrackingNo').value,
        total_amount: parseInt(document.getElementById('editTotalAmount').value) || 0
      };
      
      const { error } = await supabaseClient.from('orders').update(updates).eq('order_id', orderId);
      if (error) return alert('更新失敗：' + error.message);
      
      editOrderModal.hide();
      loadAdminOrders();
      alert('訂單已更新！');
    }

    async function updateProfile() {
      const fb_name = document.getElementById('fbNameInput').value;
      const { data: { user } } = await supabaseClient.auth.getUser();
      const { error } = await supabaseClient.from('members').update({ fb_name }).eq('email', user.email);
      if (error) alert('更新失敗：' + error.message);
      else alert('已儲存');
    }

    async function updateInvoiceInfo() {
      const { data: { user } } = await supabaseClient.auth.getUser();
      const updates = {
        invoice_type: document.getElementById('invoiceType').value,
        company_tax_id: document.getElementById('taxIdInput').value,
        company_name: document.getElementById('companyNameInput').value,
        carrier_num: document.getElementById('carrierNumInput').value,
        donate_code: document.getElementById('donateCodeInput').value
      };
      const { error } = await supabaseClient.from('members').update(updates).eq('email', user.email);
      if (error) alert('更新失敗：' + error.message);
      else alert('發票資訊已儲存');
    }

    supabaseClient.auth.onAuthStateChange((event, session) => {
      if (session) {
        document.getElementById('loginCard').classList.add('hide');
        document.getElementById('app').classList.remove('hide');
        loadData(session.user);
      } else {
        document.getElementById('loginCard').classList.remove('hide');
        document.getElementById('app').classList.add('hide');
      }
    });
  </script>
</body>
</html>
