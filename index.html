<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>INBABY 茵寶貝｜全功能管理系統 (Supabase 版)</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --main-pink: #f9a8c0;
      --dark-pink: #f06292;
      --light-pink: #fce4ec;
      --soft-pink: #fdf0f4;
      --text-dark: #3d2b35;
      --text-gray: #7a6370;
      --border-pink: #f8bbd0;
    }
    body { background: #fff5f8; font-family: "Microsoft JhengHei", sans-serif; font-size: 14px; color: var(--text-dark); min-height: 100vh; }
    h4, h5 { color: var(--dark-pink); font-weight: 700; }
    #loginCard { background: #fff; border: none; border-radius: 24px; box-shadow: 0 8px 40px rgba(240,98,146,0.12); padding: 2.5rem; margin-top: 5vh; max-width: 450px; margin-left: auto; margin-right: auto; }
    .btn-pink { background: linear-gradient(135deg, var(--main-pink), var(--dark-pink)); color: #fff !important; border: none; border-radius: 50px; font-weight: 600; padding: 8px 20px; transition: all 0.2s; box-shadow: 0 4px 12px rgba(240,98,146,0.3); }
    .btn-pink:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(240,98,146,0.4); }
    .hide { display: none !important; }
    .nav-tabs { border: none; background: #fff; border-radius: 50px; padding: 4px; display: inline-flex; box-shadow: 0 2px 12px rgba(240,98,146,0.08); margin-bottom: 1.5rem; }
    .nav-tabs .nav-link { border: none !important; border-radius: 50px !important; padding: 8px 22px; color: var(--text-gray); cursor: pointer; }
    .nav-tabs .nav-link.active { background: var(--dark-pink) !important; color: #fff !important; font-weight: 700; }
    .card { border: 1px solid var(--border-pink) !important; border-radius: 18px !important; box-shadow: 0 4px 20px rgba(240,98,146,0.06) !important; background: #fff; margin-bottom: 20px; }
    table.table thead th { background: linear-gradient(135deg, var(--main-pink), var(--dark-pink)) !important; color: #fff !important; font-weight: 600; padding: 12px 10px !important; font-size: 13px; border: none; }
  </style>
</head>
<body>
  <div class="container py-4">
    <!-- 登入介面 -->
    <div id="loginCard" class="card">
      <h3 class="text-center mb-4" style="color:var(--dark-pink)">INBABY 茵寶貝會員登入</h3>
      <div id="loginForm">
        <div class="mb-3">
          <label class="form-label">電子郵件 Email</label>
          <input type="email" id="loginEmail" class="form-control" placeholder="請輸入您登記的 Email">
        </div>
        <button class="btn btn-pink w-100 py-2" onclick="sendOtp()">取得驗證連結</button>
        <p class="text-muted small mt-3 text-center">系統將發送登入連結至您的信箱，點擊即可登入。</p>
      </div>
    </div>

    <!-- 主應用介面 -->
    <div id="app" class="hide">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h4 class="mb-0">INBABY 茵寶貝童裝社團系統</h4>
          <span id="who" class="text-muted small"></span>
        </div>
        <button class="btn btn-outline-danger btn-sm" onclick="logout()">安全登出</button>
      </div>

      <ul class="nav nav-tabs">
        <li class="nav-item"><a class="nav-link active" id="tab-orders" onclick="switchTab('orders')">我的訂單</a></li>
        <li class="nav-item"><a class="nav-link" id="tab-profile" onclick="switchTab('profile')">個人帳戶</a></li>
        <li class="nav-item"><a class="nav-link" id="tab-fb-sync" onclick="switchTab('fb-sync')">FB 同步</a></li>
      </ul>

      <div id="tabContent">
        <!-- 訂單區塊 -->
        <div id="section-orders">
          <div class="card p-3">
            <div class="table-responsive">
              <table class="table align-middle">
                <thead>
                  <tr><th>單號</th><th>狀態</th><th>金額</th><th>物流</th><th>出貨日期</th></tr>
                </thead>
                <tbody id="ordersBody"></tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- 個人帳戶區塊 -->
        <div id="section-profile" class="hide">
          <div class="card p-4">
            <h5>帳戶資訊</h5>
            <div class="row g-4">
              <div class="col-md-6">
                <label class="form-label text-muted small">綁定的 FB 名稱</label>
                <div class="input-group">
                  <input type="text" id="fbNameInput" class="form-control">
                  <button class="btn btn-pink" onclick="updateProfile()">儲存修改</button>
                </div>
              </div>
              <div class="col-md-6">
                <label class="text-muted small d-block">帳戶餘額 (購物金)</label>
                <h4 id="profileBalance" class="text-success fw-bold">$0</h4>
              </div>
            </div>
          </div>
        </div>

        <!-- FB 同步區塊 -->
        <div id="section-fb-sync" class="hide">
          <div class="card p-4">
            <h5>Facebook 留言同步</h5>
            <div class="mb-3">
              <label class="form-label">Facebook 社團 ID</label>
              <input type="text" id="fbGroupId" class="form-control" placeholder="請輸入 Facebook 社團 ID">
            </div>
            <div class="mb-3">
              <label class="form-label">Facebook 貼文 ID</label>
              <input type="text" id="fbPostId" class="form-control" placeholder="請輸入 Facebook 貼文 ID">
            </div>
            <div class="mb-3">
              <label class="form-label">Facebook 存取權杖 (Access Token)</label>
              <input type="text" id="fbAccessToken" class="form-control" placeholder="請輸入您的 Facebook 存取權杖">
            </div>
            <button class="btn btn-pink w-100 py-2" onclick="syncFbComments()">同步 Facebook 留言</button>
            <div id="fbSyncStatus" class="mt-3 text-center small"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Supabase 設定
    const SUPABASE_URL = 'https://dcbpjxjdwdvftpiighyw.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_DbPSGp8fOxtt30VDFXtlvw_LzexqDTa';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 1. 登入功能 (Magic Link)
    async function sendOtp() {
      const emailInput = document.getElementById('loginEmail');
      const email = emailInput.value;
      if (!email) {
        alert('請輸入電子郵件！');
        return;
      }
      const { error } = await supabaseClient.auth.signInWithOtp({
        email: email,
        options: { emailRedirectTo: window.location.href }
      });
      if (error) alert('發送失敗: ' + error.message);
      else alert('登入連結已發送至您的信箱，請查收！');
    }

    // 2. 登出功能
    async function logout() {
      await supabaseClient.auth.signOut();
      window.location.reload();
    }

    // 3. 切換頁籤
    function switchTab(tab) {
      document.getElementById('section-orders').classList.toggle('hide', tab !== 'orders');
      document.getElementById('section-profile').classList.toggle('hide', tab !== 'profile');
      document.getElementById('section-fb-sync').classList.toggle('hide', tab !== 'fb-sync');
      document.getElementById('tab-orders').classList.toggle('active', tab === 'orders');
      document.getElementById('tab-profile').classList.toggle('active', tab === 'profile');
      document.getElementById('tab-fb-sync').classList.toggle('active', tab === 'fb-sync');
    }

    // 4. 載入資料
    async function loadData(user) {
      document.getElementById('who').innerText = user.email;
      
      const { data: profile, error: profileError } = await supabaseClient
        .from('members')
        .select('*')
        .eq('email', user.email)
        .maybeSingle();
      
      if (profile) {
        document.getElementById('fbNameInput').value = profile.fb_name || '';
        document.getElementById('profileBalance').innerText = '$' + (profile.account_balance || 0);
        
        const { data: orders } = await supabaseClient
          .from('orders')
          .select('*')
          .eq('member_id', profile.member_id)
          .order('created_at', { ascending: false });

        const body = document.getElementById('ordersBody');
        body.innerHTML = orders?.map(o => `
          <tr>
            <td>${o.order_id}</td>
            <td><span class="badge bg-info">${o.order_status}</span></td>
            <td>$${o.total_amount}</td>
            <td>${o.shipping_method || '-'}</td>
            <td>${o.shipping_date || '-'}</td>
          </tr>
        `).join('') || '<tr><td colspan="5" class="text-center">暫無訂單</td></tr>';
      } else {
        console.log('找不到對應的會員資料，請在 Supabase members 表中新增 Email');
      }
    }

    // 5. 更新資料
    async function updateProfile() {
      const fbName = document.getElementById('fbNameInput').value;
      const { data: { user } } = await supabaseClient.auth.getUser();
      if (!user) return;
      
      const { error } = await supabaseClient
        .from('members')
        .update({ fb_name: fbName })
        .eq('email', user.email);
      
      if (error) alert('更新失敗: ' + error.message);
      else alert('更新成功！');
    }

    // 6. 同步 Facebook 留言 (前端直接處理)
    async function syncFbComments() {
      const groupId = document.getElementById('fbGroupId').value;
      const postId = document.getElementById('fbPostId').value;
      const accessToken = document.getElementById('fbAccessToken').value;
      const statusDiv = document.getElementById('fbSyncStatus');

      if (!groupId || !postId || !accessToken) {
        statusDiv.innerHTML = '<span class="text-danger">請輸入 Facebook 社團 ID、貼文 ID 和存取權杖！</span>';
        return;
      }

      statusDiv.innerHTML = '<span class="text-info">正在同步留言，請稍候...</span>';
      
      try {
        // 1. 取得 Facebook 留言
        const fbApiUrl = `https://graph.facebook.com/v18.0/${postId}/comments?access_token=${accessToken}&limit=1000`;
        const fbResponse = await fetch(fbApiUrl);
        const fbData = await fbResponse.json();

        if (fbData.error) {
          throw new Error(fbData.error.message);
        }

        const comments = fbData.data;
        let newOrdersCount = 0;

        // 2. 解析留言並寫入 Supabase
        for (const comment of comments) {
          if (comment.message.includes('+1')) {
            const memberName = comment.from.name;
            const commentId = comment.id;

            // 檢查會員是否存在，不存在則新增
            let { data: member, error: memberError } = await supabaseClient
              .from('members')
              .select('member_id')
              .eq('fb_name', memberName)
              .maybeSingle();

            if (memberError) throw memberError;

            if (!member) {
              const { data: newMember, error: insertMemberError } = await supabaseClient
                .from('members')
                .insert({ fb_name: memberName })
                .select('member_id')
                .single();
              if (insertMemberError) throw insertMemberError;
              member = newMember;
            }

            // 檢查訂單是否已存在，不存在則新增
            const { data: existingOrder, error: orderCheckError } = await supabaseClient
              .from('orders')
              .select('order_id')
              .eq('comment_id', commentId)
              .maybeSingle();

            if (orderCheckError) throw orderCheckError;

            if (!existingOrder) {
              const { error: insertOrderError } = await supabaseClient
                .from('orders')
                .insert({
                  member_id: member.member_id,
                  order_status: '待處理',
                  total_amount: 0, // 預設為 0，可後續修改
                  shipping_method: '待確認',
                  comment_id: commentId,
                  post_id: postId,
                  group_id: groupId
                });
              if (insertOrderError) throw insertOrderError;
              newOrdersCount++;
            }
          }
        }

        statusDiv.innerHTML = `<span class="text-success">同步成功！新增 ${newOrdersCount} 筆訂單。</span>`;
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (user) loadData(user); // Reload data after sync

      } catch (error) {
        statusDiv.innerHTML = `<span class="text-danger">同步失敗: ${error.message}</span>`;
        console.error('FB Sync Error:', error);
      }
    }

    // 7. 監聽登入狀態
    supabaseClient.auth.onAuthStateChange((event, session) => {
      if (session) {
        document.getElementById('loginCard').classList.add('hide');
        document.getElementById('app').classList.remove('hide');
        loadData(session.user);
      } else {
        document.getElementById('loginCard').classList.remove('hide');
        document.getElementById('app').classList.add('hide');
      }
    });
  </script>
</body>
</html>
